apply plugin: "com.android.application"
apply plugin: "org.jetbrains.kotlin.android"
apply plugin: "com.facebook.react"

react {
    entryFile = file("../../index.js")
    reactNativeDir = file("../../../../node_modules/react-native")
    hermesCommand = new File(rootDir, "../../../node_modules/react-native/sdks/hermesc/win64-bin/hermesc.exe").absolutePath.replace("\\", "/")
    codegenDir = file("../../../../node_modules/@react-native/codegen")
    cliFile = file("../../../../node_modules/react-native/cli.js")
}

android {
    ndkVersion rootProject.ext.ndkVersion
    buildToolsVersion rootProject.ext.buildToolsVersion
    compileSdk rootProject.ext.compileSdkVersion
    namespace "de.abgemiked.donna"
    defaultConfig {
        applicationId "de.abgemiked.donna"
        minSdk rootProject.ext.minSdkVersion
        targetSdk rootProject.ext.targetSdkVersion
        versionCode 3
        versionName "0.5.0"
        // Backend-URL für PairingActivity und VoiceInputActivity
        // DONNA-103: DONNA_API_TOKEN entfernt — Token kommt aus TokenStore (EncryptedSharedPreferences)
        buildConfigField "String", "DONNA_API_URL", '"https://assistent.abgemiked.de"'
        // DONNA-13: ntfy-Server-URL für NtfyService SSE-Stream (separater Container)
        buildConfigField "String", "DONNA_NTFY_URL", '"https://ntfy.assistent.abgemiked.de"'
    }
    signingConfigs {
        release {
            storeFile file("donna-release.keystore")
            storePassword "donna2026"
            keyAlias "donna"
            keyPassword "donna2026"
        }
    }
    buildTypes {
        debug { signingConfig signingConfigs.debug }
        release {
            signingConfig signingConfigs.release
            minifyEnabled false   // ProGuard deaktiviert bis RN ProGuard-Rules stabil sind
            proguardFiles getDefaultProguardFile("proguard-android.txt"), "proguard-rules.pro"
        }
    }
}

dependencies {
    implementation("com.facebook.react:react-android")
    implementation("com.facebook.react:hermes-android")
    implementation 'androidx.biometric:biometric:1.1.0'
    // DONNA-103: Verschlüsselter Token-Speicher (Android Keystore-backed)
    implementation 'androidx.security:security-crypto:1.1.0-alpha06'
    // Explicit native module dependencies (autolinking generates PackageList but doesn't add classpath in monorepo)
    implementation project(':react-native-async-storage_async-storage')
    implementation project(':react-native-voice_voice')
    implementation project(':react-native-safe-area-context')
    // DONNA-13: ntfy Notifications
    implementation project(':notifee_react-native')
    // DONNA-119: Activity Recognition (Teil von play-services-location)
    implementation 'com.google.android.gms:play-services-location:21.3.0'
    // DONNA-120: Health Connect
    implementation "androidx.health.connect:connect-client:1.1.0-alpha10"
    // DONNA-130: CameraX für Vision-Analyse (Foto aufnehmen ohne Speichern)
    implementation "androidx.camera:camera-core:1.3.4"
    implementation "androidx.camera:camera-camera2:1.3.4"
    implementation "androidx.camera:camera-lifecycle:1.3.4"
    // DONNA-128: MediaPipe LLM Inference — NOCH NICHT eingebunden (Modell ~1GB fehlt)
    // Wird in Phase 2 ergänzt wenn Modell-Download implementiert ist:
    // implementation "com.google.mediapipe:tasks-genai:0.10.14"
    // DONNA-157: Gemini Nano via Android AICore (S25 Ultra, Pixel 8+, Android 14+)
    implementation "com.google.ai.edge.aicore:aicore:0.0.1-exp01"
    // DONNA-192: Apache Commons Compress — BZip2+Tar Extraktion für Piper-Bundle
    implementation 'org.apache.commons:commons-compress:1.26.1'
    // DONNA-192: Piper ONNX On-Device TTS via sherpa-onnx
    // AAR von GitHub Releases: https://github.com/k2-fsa/sherpa-onnx/releases/download/v1.13.1/sherpa-onnx-1.13.1.aar
    // Datei muss unter app/libs/sherpa-onnx-1.13.1.aar abgelegt werden (einmalig, nicht im Git)
    // Automatischer Download via gradle task 'downloadSherpaOnnx' (siehe unten)
    implementation fileTree(dir: 'libs', include: ['*.aar'])
    // DONNA-189 Phase 2: Phi-3 Mini INT4 via ONNX Runtime GenAI
    // AAR von GitHub Releases: https://github.com/microsoft/onnxruntime-genai/releases/download/v0.6.0/onnxruntime-genai-android-0.6.0.aar
    // Datei muss unter app/libs/onnxruntime-genai-android-0.6.0.aar abgelegt werden (einmalig, nicht im Git)
    // Automatischer Download via gradle task 'downloadOnnxRuntimeGenAI' (siehe unten)
    // Hinweis: fileTree(libs) deckt bereits diese AAR ab — kein separater Eintrag nötig
}

// native_modules.gradle not needed in React Native 0.76+ — autolinking via com.facebook.react Gradle plugin

// DONNA-192: sherpa-onnx AAR automatisch herunterladen wenn nicht vorhanden
// Ausführen mit: ./gradlew downloadSherpaOnnx
task downloadSherpaOnnx {
    def libsDir = file("libs")
    def aarFile = file("libs/sherpa-onnx-1.13.1.aar")
    def aarUrl = "https://github.com/k2-fsa/sherpa-onnx/releases/download/v1.13.1/sherpa-onnx-1.13.1.aar"

    doLast {
        if (!aarFile.exists()) {
            libsDir.mkdirs()
            println "Lade sherpa-onnx-1.13.1.aar herunter (~180MB) ..."
            new URL(aarUrl).withInputStream { is ->
                aarFile.withOutputStream { os ->
                    os << is
                }
            }
            println "sherpa-onnx-1.13.1.aar heruntergeladen: ${aarFile.absolutePath}"
        } else {
            println "sherpa-onnx-1.13.1.aar bereits vorhanden: ${aarFile.absolutePath}"
        }
    }
}

// DONNA-189: onnxruntime-genai AAR automatisch herunterladen wenn nicht vorhanden
// Ausführen mit: ./gradlew downloadOnnxRuntimeGenAI
task downloadOnnxRuntimeGenAI {
    def libsDir = file("libs")
    def aarFile = file("libs/onnxruntime-genai-android-0.6.0.aar")
    def aarUrl = "https://github.com/microsoft/onnxruntime-genai/releases/download/v0.6.0/onnxruntime-genai-android-0.6.0.aar"

    doLast {
        if (!aarFile.exists()) {
            libsDir.mkdirs()
            println "Lade onnxruntime-genai-android-0.6.0.aar herunter (~2.9MB) ..."
            new URL(aarUrl).withInputStream { is ->
                aarFile.withOutputStream { os ->
                    os << is
                }
            }
            println "onnxruntime-genai-android-0.6.0.aar heruntergeladen: ${aarFile.absolutePath}"
        } else {
            println "onnxruntime-genai-android-0.6.0.aar bereits vorhanden: ${aarFile.absolutePath}"
        }
    }
}

// preBuild hängt von beiden Downloads ab — AARs müssen vor Kompilierung vorliegen
preBuild.dependsOn downloadSherpaOnnx
preBuild.dependsOn downloadOnnxRuntimeGenAI
